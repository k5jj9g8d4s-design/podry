<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Для моей подружки 💕</title>


<style>

body {
    margin:0;
    font-family: Arial, sans-serif;
    background:linear-gradient(135deg,#ffd6ed,#fff4fa);
    text-align:center;
    overflow-x:hidden;
}


/* Подарок */

#giftScreen {

    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff9dcc,#ffe6f4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:5;

}


.gift {

    font-size:110px;
    cursor:pointer;
    animation:jump 1s infinite;

}


@keyframes jump {

50% {
    transform:translateY(-20px);
}

}


.hide {

    animation:hide 1s forwards;

}


@keyframes hide {

to {

    opacity:0;
    visibility:hidden;

}

}



/* Основной блок */

.container {

    background:white;
    width:85%;
    max-width:500px;
    margin:40px auto;
    padding:25px;
    border-radius:30px;
    box-shadow:0 10px 30px #f4afd2;

}


h1 {

    color:#ff4f9a;

}


h2 {

    color:#ff72ae;

}



img {

    width:250px;
    border-radius:25px;
    box-shadow:0 5px 20px pink;

}



button {

    background:#ff72ad;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:30px;
    font-size:16px;
    margin:10px;
    cursor:pointer;

}


.hidden {

    display:none;

}



/* Игра */


#gameArea {

    height:300px;
    background:#fff0f8;
    border-radius:20px;
    position:relative;
    overflow:hidden;

}


.gameHeart {

    position:absolute;
    font-size:35px;
    cursor:pointer;

}



/* Падающие сердечки */

.heart {

    position:fixed;
    color:#ff72ad;
    animation:fall 5s linear;

}


@keyframes fall {

from {

    transform:translateY(-50px);

}


to {

    transform:translateY(100vh);

}

}


</style>

</head>



<body>



<!-- Начало -->

<div id="giftScreen">


<div class="gift" onclick="openGift()">

🎁

</div>


<h2>
У меня есть кое-что для тебя 💗
</h2>


<p>
Нажми на подарок ✨
</p>


</div>




<div class="container">


<h1>
👭 Наша дружба 💕
</h1>



<img src="photo.jpg">



<h2>
Ты моя пидружка❤️
</h2>



<button onclick="music()">
🎵 Включить нашу песню
</button>


<audio id="song">

<source src="music.mp3">

</audio>




<button onclick="letter()">
💌 Открыть письмо
</button>



<div id="letter" class="hidden">


<h3>
Для тебя 💗
</h3>


<p>

Спасибо тебе за все наши разговоры,
смешные моменты и поддержку.

Я очень ценю нашу дружбу.
Пусть у нас будет ещё много
счастливых воспоминаний ✨

</p>


</div>




<button onclick="showGame()">
🎮 Мини-игра
</button>



<div id="game" class="hidden">


<h3>
Собери сердечки 💕
</h3>


<p>
Счёт:
<span id="score">0</span>
</p>


<div id="gameArea"></div>


</div>



</div>





<script>


function openGift(){

document
.getElementById("giftScreen")
.classList.add("hide");

}




function music(){

document
.getElementById("song")
.play();

}




function letter(){

document
.getElementById("letter")
.style.display="block";

}




function showGame(){

document
.getElementById("game")
.style.display="block";


createHeart();

}



let score=0;



function createHeart(){


let area=document.getElementById("gameArea");


let heart=document.createElement("div");


heart.innerHTML="💗";


heart.className="gameHeart";



heart.style.left=Math.random()*250+"px";

heart.style.top=Math.random()*250+"px";



heart.onclick=function(){


score++;


document
.getElementById("score")
.innerHTML=score;


heart.remove();


createHeart();


}



area.appendChild(heart);


}





setInterval(()=>{


let h=document.createElement("div");


h.className="heart";


h.innerHTML="💗";


h.style.left=Math.random()*100+"%";


h.style.fontSize=Math.random()*30+20+"px";



document.body.appendChild(h);



setTimeout(()=>{

h.remove();

},5000);



},700);



</script>



</body>

</html>
